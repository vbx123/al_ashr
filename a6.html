Enter<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد! 🎉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        :root {
            --primary-color: #ff477e;
            --secondary-color: #ff85a2;
            --dark-bg: #0b0813;
            --card-bg: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-light: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 1. صفحة البداية والمفاجأة */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .pulse-element {
            font-size: 5rem;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        .intro-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 71, 126, 0.6);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .intro-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 71, 126, 0.9);
        }

        /* 2. المحتوى الرئيسي */
        #main-content {
            opacity: 0;
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #1f1a24 0%, #0b0813 100%);
            transition: opacity 1.5s ease-in;
            padding: 40px 20px;
            width: 100%;
            min-height: 100vh;
        }

        /* زر صوت صغير وأنيق في الأعلى */
        .audio-control {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            z-index: 100;
            transition: all 0.3s;
        }

        .audio-control:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* الجزء العلوي (الهيدر) */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 25px var(--primary-color);
            animation: float 3s ease-in-out infinite;
        }

        .birthday-title {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ffe600, #ff477e, #ff85a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* حاويات الأقسام التفاعلية */
        .section-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--secondary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ألبوم الصور (Slider) */
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 12px;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 5;
        }

        .slider-btn.prev { right: 10px; }
        .slider-btn.next { left: 10px; }

        /* صندوق التعليقات */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comment-form input, .comment-form textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .comment-form input:focus, .comment-form textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .comment-form button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .comment-form button:hover {
            background: #e0366f;
        }

        .comments-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 5px;
        }

        .comment-card {
            background: rgba(255, 255, 255, 0.03);
            border-right: 3px solid var(--primary-color);
            padding: 12px;
            border-radius: 4px 8px 8px 4px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .comment-author {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--secondary-color);
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 0.9rem;
            color: #ddd;
        }

        /* الحركات الزخرفية */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 99;
            animation: fall linear forwards;
        }

        @keyframes pulse { 0% { transform: scale(0.9); } 100% { transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <!-- 1. صفحة المفاجأة -->
    <div id="intro-overlay">
        <div class="pulse-element">🎁</div>
        <button class="intro-btn" onclick="startCelebration()">إفتح المفاجأة ✨</button>
    </div>

    <!-- 2. محتوى الصفحة الرئيسي -->
    <main id="main-content">
        <!-- زر صوت علوي صغير -->
        <button class="audio-control" onclick="toggleAudio()">
            <span id="audio-icon">🔊</span>
            <span id="audio-text">صوت</span>
        </button>

        <!-- الهيدر والصورة -->
        <div class="header-section">
            <div class="profile-container">
                <img class="profile-img" src="https://via.placeholder.com/160" alt="صاحب عيد الميلاد">
            </div>
            <h1 class="birthday-title">اليوم عيد ميلادي! 🎉</h1>
            <p style="color: #bbb;">مرحباً بكم في مساحتي الخاصة للاحتفال بيومي المميز</p>
        </div>

        <!-- ألبوم الصور التفاعلي -->
        <section class="section-container">
            <h2 class="section-title">📸 ألبوم ذكرياتي الكاجوال</h2>
            <div class="slider-wrapper">
                <div class="slide active"><img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=500" alt="صورة 1"></div>
                <div class="slide"><img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=500" alt="صورة 2"></div>
                <div class="slide"><img src="https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500" alt="صورة 3"></div>
                
                <button class="slider-btn prev" onclick="moveSlide(-1)">&#10095;</button>
                <button class="slider-btn next" onclick="moveSlide(1)">&#10094;</button>
            </div>
        </section>

        <!-- صندوق التهاني والتعليقات المربوط بجوجل فورم -->
        <section class="section-container">
            <h2 class="section-title">✍️ دفتر تهاني الأصدقاء</h2>
            
            <form class="comment-form" id="commentForm">
                <input type="text" id="visitor-name" placeholder="اكتب اسمك الكريم هنا..." required>
                <textarea id="visitor-message" rows="3" placeholder="اترك لي تهنئة أو كلمة جميلة بمناسبة عيد ميلادي... ✨" required></textarea>
                <button type="submit">إرسال التهنئة وإشعال شمعة 🎂</button>
            </form>

            <div class="comments-list" id="comments-box">
                <!-- ستظهر التعليقات هنا ديناميكياً من ملف الإكسل -->
            </div>
        </section>
    </main>

    <script>
        // الروابط والرموز المحدثة بالكامل بناءً على الرابط الجديد الذي أرسلته
        const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScypTLNbxtVG_WeTa8IpvgbCLsPKRW7KtYGD_g0jurSvPKZmA/formResponse";
        const NAME_ENTRY_ID = "entry.1556049761"; 
        const MESSAGE_ENTRY_ID = "entry.1885688493";

        // الرابط الخاص بنشر ملف الإكسل الجديد بصيغة CSV جاهز تماماً
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrfudn-eJkvS6KVgPExqVElFB_TKXlGbjR2nWn4WoFdJmzNYMfYQfxYKDFXCn_gyXd6Xn1V-DspTyi/pub?output=csv";

        const music = document.getElementById('bg-music');
        const introOverlay = document.getElementById('intro-overlay');
        const mainContent = document.getElementById('main-content');
        const audioIcon = document.getElementById('audio-icon');

        function startCelebration() {
            music.play().catch(err => console.log("Audio block:", err));
            introOverlay.style.opacity = '0';
            introOverlay.style.visibility = 'hidden';
            mainContent.style.opacity = '1';
            mainContent.style.visibility = 'visible';
            createConfetti();
        }

        function toggleAudio() {
            if (music.paused) {
                music.play();
                audioIcon.innerText = "🔊";
            } else {
                music.pause();
                audioIcon.innerText = "🔇";
            }
        }

        // تحريك ألبوم الصور
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function moveSlide(direction) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // إرسال البيانات فوراً إلى نموذج جوجل
        document.getElementById('commentForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const nameInput = document.getElementById('visitor-name');
            const messageInput = document.getElementById('visitor-message');

            const nameValue = nameInput.value;
            const messageValue = messageInput.value;

            const formData = new FormData();
            formData.append(NAME_ENTRY_ID, nameValue);
            formData.append(MESSAGE_ENTRY_ID, messageValue);

            fetch(GOOGLE_FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                addNewCommentOnUI(nameValue, messageValue);
                nameInput.value = '';
                messageInput.value = '';
                for(let i=0; i<15; i++) spawnSingleConfetti();
            })
            .catch(err => console.error("خطأ في إرسال التهنئة:", err));
        });

        // دالة جلب كل التعليقات المخزنة في الإكسل وعرضها
        function loadCommentsFromSheet() {
            if (!GOOGLE_SHEET_CSV_URL.includes("http")) {
                const commentsBox = document.getElementById('comments-box');
                commentsBox.innerHTML = `
                    <div class="comment-card">
                        <div class="comment-author">أحمد خالد</div>
                        <div class="comment-text">كل عام وأنت بألف خير يا صاحبي! سنة سعيدة عليك تحقق فيها كل طموحاتك يارب. 🎈</div>
                    </div>
                `;
                return;
            }

            fetch(GOOGLE_SHEET_CSV_URL)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1);
                const commentsBox = document.getElementById('comments-box');
                commentsBox.innerHTML = '';

                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    if (columns.length >= 3) {
                        const name = columns[1].replace(/"/g, "").trim();
                        const msg = columns[2].replace(/"/g, "").trim();
                        if (name && msg) {
                            addNewCommentOnUI(name, msg);
                        }
                    }
                });
            })
            .catch(err => console.error("خطأ في جلب التعليقات:", err));
        }

        function addNewCommentOnUI(name, message) {
            const commentsBox = document.getElementById('comments-box');
            const card = document.createElement('div');
            card.classList.add('comment-card');
            
            card.innerHTML = `
                <div class="comment-author">${escapeHTML(name)}</div>
                <div class="comment-text">${escapeHTML(message)}</div>
            `;

            commentsBox.insertBefore(card, commentsBox.firstChild);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function spawnSingleConfetti() {
            const colors = ['#ff477e', '#ff85a2', '#ffe600', '#2ec4b6', '#ff9f1c'];
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = confetti.style.height = (Math.random() * 6 + 6) + 'px';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }

        function createConfetti() {
            setInterval(() => {
                if (!document.hidden && mainContent.style.opacity === '1') {
                    spawnSingleConfetti();
                }
            }, 250);
        }

        window.addEventListener('DOMContentLoaded', loadCommentsFromSheet);
    </script>
</body>
</html>
