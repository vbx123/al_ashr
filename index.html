<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X O PRO - النسخة الذهبية</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --color-x: #ff4757; 
            --color-o: #2ed573; 
            --accent: #fbc531;
            /* تصغير المقاسات هنا */
            --board-size: 360px; 
            --cell-size: 110px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-title {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(251, 197, 49, 0.3);
        }

        /* شاشة الإعدادات - حجم ملموم */
        .setup-container {
            background: var(--bg-panel);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
        }

        input[type="text"], select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        /* لوحة النتائج */
        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .scoreboard {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .player-card {
            background: var(--bg-panel);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .p1-active { border-color: var(--color-x); box-shadow: 0 0 10px var(--color-x); }
        .p2-active { border-color: var(--color-o); box-shadow: 0 0 10px var(--color-o); }

        .leader { transform: scale(1.05); background: #2d3e50; border-color: var(--accent); }

        .score-val { font-size: 2.5rem; font-weight: bold; display: block; }

        /* منطقة اللعب */
        .board-wrapper {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            height: 100%;
        }

        .cell {
            background: var(--bg-panel);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell:hover:not(.taken) { background: #334155; }
        .x-style { color: var(--color-x); text-shadow: 0 0 10px var(--color-x); }
        .o-style { color: var(--color-o); text-shadow: 0 0 10px var(--color-o); }

        /* خط الفوز */
        #win-line {
            position: absolute;
            height: 6px;
            background: var(--accent);
            border-radius: 10px;
            z-index: 5;
            display: none;
            box-shadow: 0 0 15px var(--accent);
        }

        .status { margin: 15px 0; font-size: 1.2rem; height: 1.5rem; }

        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-main { background: var(--accent); color: black; }
        .btn-danger { background: #ff4757; color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <h1 class="main-title">X O PRO ✨</h1>

    <div id="setup" class="setup-container">
        <h3>إعداد اللقاء</h3>
        <input type="text" id="p1Name" placeholder="اللاعب 1">
        <select id="p1Symbol">
            <option value="X">يلعب بـ X</option>
            <option value="O">يلعب بـ O</option>
        </select>
        <input type="text" id="p2Name" placeholder="اللاعب 2">
        <button class="btn btn-main" style="width: 95%" onclick="initGame()">دخول الحلبة</button>
    </div>

    <div id="game" class="game-container">
        <div class="scoreboard">
            <div id="card1" class="player-card">
                <span id="display-n1" style="color: var(--color-x)">-</span>
                <span id="s1" class="score-val">0</span>
            </div>
            <div id="card2" class="player-card">
                <span id="display-n2" style="color: var(--color-o)">-</span>
                <span id="s2" class="score-val">0</span>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div class="board-wrapper">
            <div id="win-line"></div>
            <div class="board" id="board">
                <div class="cell" data-i="0"></div>
                <div class="cell" data-i="1"></div>
                <div class="cell" data-i="2"></div>
                <div class="cell" data-i="3"></div>
                <div class="cell" data-i="4"></div>
                <div class="cell" data-i="5"></div>
                <div class="cell" data-i="6"></div>
                <div class="cell" data-i="7"></div>
                <div class="cell" data-i="8"></div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn btn-main" onclick="nextRound()">جولة جديدة</button>
            <button class="btn btn-danger" onclick="location.reload()">تغيير اللاعبين</button>
        </div>
    </div>

    <script>
        let p1, p2, cur, active = true, state = ["","","","","","","","",""];
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function initGame() {
            let n1 = document.getElementById('p1Name').value || "لاعب 1";
            let s1 = document.getElementById('p1Symbol').value;
            let n2 = document.getElementById('p2Name').value || "لاعب 2";
            
            p1 = { name: n1, sym: s1, score: 0, card: document.getElementById('card1') };
            p2 = { name: n2, sym: s1==='X'?'O':'X', score: 0, card: document.getElementById('card2') };
            
            document.getElementById('display-n1').innerText = p1.name + ` (${p1.sym})`;
            document.getElementById('display-n2').innerText = p2.name + ` (${p2.sym})`;
            
            cur = (p1.sym === 'X') ? p1 : p2;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            document.getElementById('status').innerHTML = `دور: <b style="color:${cur === p1 ? 'var(--color-x)' : 'var(--color-o)'}">${cur.name}</b>`;
            p1.card.className = 'player-card' + (cur === p1 ? ' p1-active' : '');
            p2.card.className = 'player-card' + (cur === p2 ? ' p2-active' : '');
            
            if(p1.score > p2.score) p1.card.classList.add('leader');
            else if(p2.score > p1.score) p2.card.classList.add('leader');
        }

        document.querySelectorAll('.cell').forEach(c => c.addEventListener('click', (e) => {
            let i = e.target.dataset.i;
            if (state[i] || !active) return;

            state[i] = cur.sym;
            e.target.innerText = cur.sym;
            e.target.classList.add('taken', cur.sym === 'X' ? 'x-style' : 'o-style');

            let win = checkWin();
            if (win) {
                active = false;
                cur.score++;
                document.getElementById('s1').innerText = p1.score;
                document.getElementById('s2').innerText = p2.score;
                document.getElementById('status').innerText = `🏆 كفو يا ${cur.name}!`;
                drawWinLine(win);
            } else if (!state.includes("")) {
                document.getElementById('status').innerText = "تعادل! 🤝";
                active = false;
            } else {
                cur = (cur === p1) ? p2 : p1;
                updateUI();
            }
        }));

        function checkWin() {
            return wins.find(cond => state[cond[0]] && state[cond[0]] === state[cond[1]] && state[cond[0]] === state[cond[2]]);
        }

        function drawWinLine(indices) {
            const cells = document.querySelectorAll('.cell');
            const start = cells[indices[0]], end = cells[indices[2]];
            const bRect = document.getElementById('board').getBoundingClientRect();
            const sRect = start.getBoundingClientRect(), eRect = end.getBoundingClientRect();
            
            const x1 = sRect.left + sRect.width/2 - bRect.left, y1 = sRect.top + sRect.height/2 - bRect.top;
            const x2 = eRect.left + eRect.width/2 - bRect.left, y2 = eRect.top + eRect.height/2 - bRect.top;
            
            const line = document.getElementById('win-line');
            const dist = Math.sqrt(Math.pow(x2-x1,2) + Math.pow(y2-y1,2));
            const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

            line.style.width = dist + 'px';
            line.style.left = x1 + 'px';
            line.style.top = y1 + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            line.style.transformOrigin = "0 50%";
            line.style.display = 'block';
            line.style.background = (cur === p1) ? 'var(--color-x)' : 'var(--color-o)';
        }

        function nextRound() {
            state = ["","","","","","","","",""];
            active = true;
            document.getElementById('win-line').style.display = 'none';
            document.querySelectorAll('.cell').forEach(c => {
                c.innerText = "";
                c.className = 'cell';
            });
            updateUI();
        }
    </script>
</body>
</html>
